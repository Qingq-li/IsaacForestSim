amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "BASE"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: /sick_laser_scan
    tf_broadcast: true
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    min_particles: 500
    max_particles: 2000
    update_min_d: 0.20
    update_min_a: 0.20
    transform_tolerance: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: BASE
    odom_topic: /odom

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: /odom
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0
      lookahead_dist: 0.8
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.2
      transform_tolerance: 0.2

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    max_velocity: [1.2, 0.0, 2.5]
    min_velocity: [-0.5, 0.0, -2.5]
    max_accel: [1.5, 0.0, 3.2]
    max_decel: [-1.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


docking_server:
  ros__parameters:
    controller_frequency: 50.0

    dock_plugins: ['dummy_dock']

    dummy_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      staging_yaw_offset: 0.0
      use_battery_status: false
      use_external_detection_pose: false

    docks: ['home_dock']

    home_dock:
      type: 'dummy_dock'
      frame: 'map'
      pose: [0.0, 0.0, 0.0]
      
collision_monitor:
  ros__parameters:
    base_frame_id: BASE
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: /sick_laser_scan

    polygons: ["FootprintApproach"]

    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      points: "[[0.80, 0.55], [0.80, -0.55], [-0.70, -0.55], [-0.70, 0.55]]"
      time_before_collision: 1.0
      simulation_time_step: 0.1

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: BASE
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: BASE
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.25
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /sick_laser_scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 8.0
          raytrace_max_range: 10.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: BASE
      resolution: 0.05
      track_unknown_space: true
      robot_radius: 0.25
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /sick_laser_scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          obstacle_max_range: 8.0
          raytrace_max_range: 10.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

map_server:
  ros__parameters:
    use_sim_time: true

map_saver:
  ros__parameters:
    use_sim_time: true

recoveries_server:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: BASE
    transform_timeout: 0.2
    simulate_ahead_time: 2.0
    recovery_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"

waypoint_follower:
  ros__parameters:
    use_sim_time: true
